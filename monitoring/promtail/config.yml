# Tails *.jsonl and rotated siblings under /var/log/basketball (host: ../data/logs).

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: basketball-jsonl
    static_configs:
      - targets:
          - localhost
        labels:
          job: basketball
          __path__: /var/log/basketball/*.jsonl*
    pipeline_stages:
      - json:
          expressions:
            event:
      - labels:
          event:
