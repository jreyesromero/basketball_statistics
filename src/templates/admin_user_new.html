<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add user — Admin</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <p class="nav-top">
        <a href="/admin/users">← All users</a>
        {% include "includes/user_session.html" %}
      </p>
      <h1>Add user</h1>

      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/admin/users/new" class="form">
        <label class="field">
          <span>Email</span>
          <input type="email" name="email" autocomplete="email" required value="{{ values.get('email', '') }}" />
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="8" />
        </label>

        <label class="field">
          <span>Confirm password</span>
          <input type="password" name="password_confirm" autocomplete="new-password" required minlength="8" />
        </label>

        <label class="field field--checkbox">
          <input type="checkbox" name="is_active" value="1" checked />
          <span>Active (can sign in)</span>
        </label>

        <label class="field field--checkbox">
          <input type="checkbox" name="is_admin" value="1" />
          <span>Administrator (can manage users)</span>
        </label>

        <button type="submit" class="btn">Create user</button>
      </form>
    </main>
  </body>
</html>
