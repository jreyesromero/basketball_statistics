<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset password — Basket</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <h1>Reset password</h1>

      {% if ok %}
      <p class="banner banner--ok" role="status">Your password was updated. You can sign in now.</p>
      <p class="auth-switch">
        <a href="/login">Sign in</a>
      </p>
      {% else %}
      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      {% if token %}
      <form method="post" action="/reset-password" class="form">
        <input type="hidden" name="token" value="{{ token }}" />
        <label class="field">
          <span>New password</span>
          <input type="password" name="password" autocomplete="new-password" required minlength="8" />
        </label>
        <label class="field">
          <span>Confirm password</span>
          <input type="password" name="password_confirm" autocomplete="new-password" required minlength="8" />
        </label>
        <button type="submit" class="btn">Save new password</button>
      </form>
      {% endif %}

      <p class="auth-switch">
        {% if not token %}
        <a href="/forgot-password">Request a new link</a>
        ·
        {% endif %}
        <a href="/login">{% if token %}← {% endif %}Sign in</a>
      </p>
      {% endif %}
    </main>
  </body>
</html>
