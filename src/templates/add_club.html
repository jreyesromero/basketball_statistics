<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Add a club — Basket</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <p class="nav-top"><a href="/clubs/management">← Clubs management</a></p>
      <h1>Add a new club</h1>

      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/clubs" class="form">
        <label class="field">
          <span>Club name</span>
          <input
            type="text"
            name="name"
            autocomplete="organization"
            required
            value="{{ values.get('name', '') }}"
          />
        </label>

        <label class="field">
          <span>Address <span class="hint">(optional)</span></span>
          <textarea name="address" rows="3">{{ values.get('address', '') }}</textarea>
        </label>

        <label class="field">
          <span>Foundation date</span>
          <input
            type="date"
            name="foundation_date"
            required
            max="{{ max_foundation }}"
            value="{{ values.get('foundation_date', '') }}"
          />
        </label>

        <button type="submit" class="btn">Save club</button>
      </form>
    </main>
  </body>
</html>
