<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sign in — Basket</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <h1>Sign in</h1>

      {% if registered_ok %}
      <p class="banner banner--ok" role="status">Account created. You can sign in now.</p>
      {% endif %}

      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" class="form">
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            name="email"
            autocomplete="email"
            required
            value="{{ values.get('email', '') }}"
          />
        </label>

        <label class="field">
          <span>Password</span>
          <input type="password" name="password" autocomplete="current-password" required />
        </label>

        <button type="submit" class="btn">Sign in</button>
      </form>

      <p class="auth-switch">
        No account yet?
        <a href="/register">Create one</a>
      </p>
    </main>
  </body>
</html>
