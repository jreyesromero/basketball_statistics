<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Forgot password — Basket</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <h1>Forgot password</h1>

      {% if sent_ok %}
      <p class="banner banner--ok" role="status">
        If an account exists for that email, we sent a link to reset your password. It expires in one hour.
      </p>
      {% endif %}

      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      <p class="bootstrap__lead">
        Enter your email address. We will send a reset link if there is an active account for it.
      </p>

      <form method="post" action="/forgot-password" class="form">
        <label class="field">
          <span>Email</span>
          <input
            type="email"
            name="email"
            autocomplete="email"
            required
            value="{{ values.get('email', '') }}"
          />
        </label>
        <button type="submit" class="btn">Send reset link</button>
      </form>

      <p class="auth-switch">
        <a href="/login">← Back to sign in</a>
      </p>
    </main>
  </body>
</html>
