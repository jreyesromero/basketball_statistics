<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New season — Basket</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="wrap wrap--narrow">
      <p class="nav-top">
        <a href="/seasons">← Seasons</a>
        {% include "includes/user_session.html" %}
      </p>
      <h1>New season</h1>
      <p class="hint">Store the season label as text (e.g. start and end calendar years).</p>

      {% if error %}
      <p class="banner banner--err" role="alert">{{ error }}</p>
      {% endif %}

      <form method="post" action="/seasons/new" class="form">
        <label class="field">
          <span>Start year</span>
          <input
            type="text"
            name="start_year"
            required
            autocomplete="off"
            value="{{ values.get('start_year', '') }}"
          />
        </label>
        <label class="field">
          <span>End year</span>
          <input
            type="text"
            name="end_year"
            required
            autocomplete="off"
            value="{{ values.get('end_year', '') }}"
          />
        </label>
        <button type="submit" class="btn">Save season</button>
      </form>
    </main>
  </body>
</html>
